kind = "web"
previewPath = "/"
title = "TransitPulse"
version = "1.0.0"
id = "artifacts/transitpulse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18711

[services.development]
run = "pnpm --filter @workspace/transitpulse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/transitpulse", "run", "build" ]
publicDir = "artifacts/transitpulse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18711"
BASE_PATH = "/"
