kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "bash /home/runner/workspace/artifacts/api-server/start.sh"

[services.env]
PORT = "8080"

[services.production]

[services.production.build]
args = ["pip", "install", "-r", "artifacts/api-server/requirements.txt", "-q"]

[services.production.run]
args = ["bash", "-c", "cd artifacts/api-server && uvicorn server:app --host 0.0.0.0 --port 8080"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
